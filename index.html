document.getElementById("englishBtn").addEventListener("click", () => {
  sentences = englishText
    .split("\n")
    .map(s => s.trim())
    .filter(s => s.length > 0);
});

let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", (e) => {
  startAudio();
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.clientX, e.clientY);
});

// Touch support for mobile
canvas.addEventListener("touchstart", (e) => {
  startAudio();
  e.preventDefault();
  const touch = e.touches[0];
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(touch.clientX, touch.clientY);
});

canvas.addEventListener("touchend", () => drawing = false);
canvas.addEventListener("touchcancel", () => drawing = false);

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  draw({ clientX: touch.clientX, clientY: touch.clientY });
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e) {
  if (!drawing) return;

  lastX = e.clientX;
  lastY = e.clientY;

  ctx.lineWidth = 0.8;
  ctx.lineCap = "round";
  ctx.globalAlpha = 0.2;
  ctx.shadowBlur = 6;
  ctx.shadowColor = ctx.strokeStyle;

  ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;

  ctx.lineTo(e.clientX, e.clientY);
  ctx.stroke();

  hue += 0.5;
  if (hue >= 360) hue = 0;

  if (Math.random() < 0.04) {
    showSentence(lastX, lastY);
  }
}

function showSentence(x, y) {
  const el = document.createElement("p");
  const text = sentences[Math.floor(Math.random() * sentences.length)];

  const offsetX = (Math.random() - 0.5) * 40;
  const startY = y + (Math.random() - 0.5) * 60;
  el.style.top = startY + "px";

  // keep text within viewport
  const safeMargin = 40;
  const maxX = window.innerWidth - safeMargin;
  const maxY = window.innerHeight - safeMargin;
  const clampedX = Math.max(safeMargin, Math.min(x + offsetX, maxX));
  const clampedY = Math.max(safeMargin, Math.min(startY, maxY));
  el.style.left = clampedX + "px";
  el.style.top = clampedY + "px";

  const spans = [];
  el.style.fontSize = (14 + Math.random() * 6) + "px";
  text.split("").forEach(char => {
    const span = document.createElement("span");
    span.innerText = char;
    span.style.display = "inline-block";
    span.style.marginRight = "1px";
    span.style.transition = "transform 10s ease-out, opacity 10s ease-out";
    el.appendChild(span);
    spans.push(span);
  });

  el.style.position = "absolute";
  el.style.maxWidth = "200px";
  el.style.lineHeight = "1.4";
  el.style.wordBreak = "break-word";
  el.style.whiteSpace = "normal";
  el.style.letterSpacing = "0.5px";


  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  el.style.opacity = 0;
  el.style.transition = "opacity 2s ease-out";

  document.body.appendChild(el);
  // subtle fade in
  el.style.opacity = 0;
  setTimeout(() => {
    el.style.opacity = 1;
  }, 200);

  // dissolve + drift (no jump)
  setTimeout(() => {
    spans.forEach((span) => {
      const dx = (centerX - (x + offsetX)) + (Math.random() - 0.5) * 40;
      const dy = (centerY - startY) + (Math.random() - 0.5) * 40;
      span.style.transform =
        "translate(" + dx + "px, " + dy + "px) scale(0.35) rotate(" + (Math.random()*180) + "deg)";
      span.style.opacity = 0.2;
    });
  }, 1500);

  setTimeout(() => {
    el.style.opacity = 0;
  }, 2500);

  setTimeout(() => {
    el.remove();
  }, 4500);
}

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// collapse headers to center after 10 seconds
setTimeout(() => {
  const headers = document.querySelectorAll("h1");
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  headers.forEach((header) => {
    const rect = header.getBoundingClientRect();
    const dx = centerX - (rect.left + rect.width / 2);
    const dy = centerY - (rect.top + rect.height / 2);

    // wrap each letter in spans for animation
    const text = header.innerText;
    header.innerText = "";
    const spans = [];
    text.split("").forEach(char => {
      const span = document.createElement("span");
      span.innerText = char;
      span.style.display = "inline-block";
      span.style.transition = "transform 8s ease-out, opacity 8s ease-out";
      header.appendChild(span);
      spans.push(span);
    });

    // apply transform to move letters to center (subtle start)
    setTimeout(() => {
      spans.forEach(span => {
        const randomOffsetX = (Math.random() - 0.5) * 20;
        const randomOffsetY = (Math.random() - 0.5) * 20;
        // transform fully to center
        span.style.transform = "translate(" + (dx + randomOffsetX) + "px, " + (dy + randomOffsetY) + "px) scale(0.3) rotate(" + (Math.random()*180) + "deg)";
        span.style.opacity = 0;
      });
    }, 100);
  });
}, 10000);
</script>
